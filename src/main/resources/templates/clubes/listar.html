<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Clubes • Fútbol Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
	/* Temática Atlético Bucaramanga 2025 */
	.page-header {
	    background: linear-gradient(135deg, #C8102E 0%, #FFB81C 100%);
	    color: #000;
	    border-radius: 16px;
	    padding: 2rem;
	    margin-bottom: 2rem;
	    box-shadow: 0 10px 25px rgba(200, 16, 46, 0.3);
	    animation: fadeInDown 0.8s ease-out;
	}

	.page-header h1 {
	    font-weight: 900;
	    font-size: 2.2rem;
	    letter-spacing: 1px;
	}

	.table-container {
	    background: white;
	    border-radius: 16px;
	    overflow: hidden;
	    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
	    animation: fadeInUp 0.9s ease-out;
	}

	.table-header {
	    background: linear-gradient(90deg, #000000 0%, #C8102E 70%);
	    color: #FFB81C;
	    padding: 1.3rem 1.8rem;
	    font-size: 1.3rem;
	    font-weight: bold;
	}

	.table-hover tbody tr {
	    transition: all 0.3s ease;
	}

	.table-hover tbody tr:hover {
	    background-color: #FFF8E1 !important;
	    transform: translateY(-3px);
	    box-shadow: 0 8px 20px rgba(200, 16, 46, 0.15);
	}

	.badge-fundacion {
	    background: linear-gradient(45deg, #C8102E, #FFB81C);
	    color: #000;
	    font-weight: 900;
	    padding: 0.6rem 1.2rem;
	    border-radius: 30px;
	    font-size: 0.95rem;
	    animation: pulse 2s infinite;
	}

	.btn-agregar {
	    background: linear-gradient(45deg, #000000, #C8102E);
	    color: #FFB81C;
	    border: none;
	    padding: 0.7rem 1.8rem;
	    font-weight: bold;
	    border-radius: 50px;
	    transition: all 0.4s ease;
	}

	.btn-agregar:hover {
	    transform: translateY(-4px);
	    box-shadow: 0 10px 20px rgba(200, 16, 46, 0.4);
	    color: white;
	}

	.btn-volver {
	    background: transparent;
	    color: #C8102E;
	    border: 2px solid #C8102E;
	    padding: 0.6rem 1.6rem;
	    border-radius: 50px;
	    font-weight: bold;
	    transition: all 0.4s ease;
	}

	.btn-volver:hover {
	    background: #C8102E;
	    color: white;
	    transform: translateY(-3px);
	}

	/* Animaciones suaves */
	@keyframes fadeInDown {
	    from { opacity: 0; transform: translateY(-40px); }
	    to { opacity: 1; transform: translateY(0); }
	}

	@keyframes fadeInUp {
	    from { opacity: 0; transform: translateY(40px); }
	    to { opacity: 1; transform: translateY(0); }
	}

	@keyframes pulse {
	    0%, 100% { transform: scale(1); }
	    50% { transform: scale(1.05); }
	}

	/* Iconos con color del club */
	.bi-shield-fill { color: #FFB81C; filter: drop-shadow(0 0 8px #C8102E); }
  </style>
  
  
</head>
<body class="bg-light">
  <div th:replace="~{fragments/layout :: navbar}"></div>

  <main class="container py-4">
    <div class="page-header">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <i class="bi bi-shield-fill me-3 display-6"></i>
          <div>
            <h1 class="h4 mb-1">Clubes</h1>
            <p class="mb-0 opacity-90">Gestión de clubes registrados en el sistema</p>
          </div>
        </div>
        <a href="/clubes/nuevo" class="btn-agregar text-decoration-none d-inline-flex align-items-center">
          <i class="bi bi-plus-circle me-2"></i> Agregar Club
        </a>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <h2 class="h5 mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Clubes</h2>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Ciudad</th>
              <th>Fundación</th>
              <th width="120">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c, i : ${clubes}">
              <td th:text="${i.index + 1}">1</td>
              <td class="fw-semibold" th:text="${c.nombre}">Nombre</td>
              <td th:text="${c.ciudad}">Ciudad</td>
              <td><span class="badge-fundacion" th:text="${c.fundacion}">2000</span></td>
              <td>
                <div class="btn-group btn-group-sm">
                  <a th:href="@{/clubes/editar/{id}(id=${c.id})}" class="btn btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <a th:href="@{/clubes/eliminar/{id}(id=${c.id})}" class="btn btn-outline-danger" 
                     onclick="return confirm('¿Estás seguro de eliminar este club?')">
                    <i class="bi bi-trash"></i>
                  </a>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <a href="/" class="btn-volver mt-3 text-decoration-none d-inline-flex align-items-center">
      <i class="bi bi-arrow-left me-2"></i> Volver al Inicio
    </a>
  </main>

  <div th:replace="~{fragments/layout :: footer}"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
