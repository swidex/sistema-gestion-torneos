<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Jugadores • Fútbol Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
	/* Atlético Bucaramanga 2025 - Fondo blanco */
	body {
	    background: #f8f9fa;
	    color: #212529;
	}

	.page-header {
	    background: linear-gradient(135deg, #C8102E 0%, #FFB81C 100%);
	    color: #000;
	    border-radius: 16px;
	    padding: 2rem;
	    margin-bottom: 2rem;
	    box-shadow: 0 10px 25px rgba(200, 16, 46, 0.3);
	    animation: fadeInDown 0.8s ease-out;
	}

	.page-header h1 { font-weight: 900; font-size: 2.4rem; }

	.table-container {
	    background: white;
	    border-radius: 16px;
	    overflow: hidden;
	    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
	    animation: fadeInUp 0.9s ease-out;
	}

	.table-header {
	    background: linear-gradient(90deg, #000000 0%, #C8102E 70%);
	    color: #FFB81C;
	    padding: 1.3rem 1.8rem;
	    font-size: 1.3rem;
	    font-weight: 900;
	}

	.table-hover tbody tr {
	    transition: all 0.35s ease;
	}

	.table-hover tbody tr:hover {
	    background: #FFF8E1 !important;
	    transform: translateY(-4px);
	    box-shadow: 0 10px 25px rgba(200, 16, 46, 0.15);
	}

	.badge-categoria {
	    background: linear-gradient(45deg, #C8102E, #FFB81C);
	    color: #000;
	    font-weight: 900;
	    padding: 0.6rem 1.3rem;
	    border-radius: 30px;
	    animation: pulse 2s infinite;
	}

	.btn-agregar {
	    background: linear-gradient(45deg, #000000, #C8102E);
	    color: #FFB81C;
	    border: none;
	    padding: 0.7rem 2rem;
	    font-weight: bold;
	    border-radius: 50px;
	    transition: all 0.4s ease;
	}

	.btn-agregar:hover {
	    transform: translateY(-5px);
	    box-shadow: 0 12px 25px rgba(200, 16, 46, 0.4);
	    color: white;
	}

	.btn-volver {
	    background: transparent;
	    color: #C8102E;
	    border: 2px solid #C8102E;
	    padding: 0.7rem 2rem;
	    border-radius: 50px;
	    font-weight: bold;
	    transition: all 0.4s ease;
	}

	.btn-volver:hover {
	    background: #C8102E;
	    color: white;
	    transform: translateY(-4px);
	}

	.bi-people-fill { color: #FFB81C; filter: drop-shadow(0 0 8px #C8102E); }

	/* Animaciones */
	@keyframes fadeInDown { from { opacity:0; transform:translateY(-50px); } to { opacity:1; transform:translateY(0); } }
	@keyframes fadeInUp   { from { opacity:0; transform:translateY(50px); }  to { opacity:1; transform:translateY(0); } }
	@keyframes pulse      { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
  </style>
  
</head>
<body class="bg-light">
  <div th:replace="~{fragments/layout :: navbar}"></div>

  <main class="container py-4">
    <div class="page-header">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <i class="bi bi-person-badge-fill me-3 display-6"></i>
          <div>
            <h1 class="h4 mb-1">Jugadores</h1>
            <p class="mb-0 opacity-90">Gestión de jugadores registrados en el sistema</p>
          </div>
        </div>
        <a href="/jugadores/nuevo" class="btn-agregar text-decoration-none d-inline-flex align-items-center">
          <i class="bi bi-plus-circle me-2"></i> Agregar Jugador
        </a>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <h2 class="h5 mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Jugadores</h2>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Dorsal</th>
              <th>Posición</th>
              <th>Equipo</th>
              <th width="120">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="j, i: ${jugadores}">
              <td th:text="${i.index + 1}">1</td>
              <td class="fw-semibold" th:text="${j.nombre}">Nombre</td>
              <td><span class="badge-dorsal" th:text="${j.dorsal}">10</span></td>
              <td th:text="${j.posicion}">Posición</td>
              <td th:text="${j.equipo != null ? j.equipo.nombre : '—'}">Equipo</td>
              <td>
                <div class="btn-group btn-group-sm">
                  <a th:href="@{/jugadores/editar/{id}(id=${j.id})}" class="btn btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <a th:href="@{/jugadores/eliminar/{id}(id=${j.id})}" class="btn btn-outline-danger" 
                     onclick="return confirm('¿Estás seguro de eliminar este jugador?')">
                    <i class="bi bi-trash"></i>
                  </a>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <a href="/" class="btn-volver mt-3 text-decoration-none d-inline-flex align-items-center">
      <i class="bi bi-arrow-left me-2"></i> Volver al Inicio
    </a>
  </main>

  <div th:replace="~{fragments/layout :: footer}"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
